# version: '3.8'

services:
  redis:
    image: redis:latest
    container_name: panel_redis
    restart: always
    networks:
      - panel_network
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: nginx:alpine
    container_name: cloudpanel-web
    restart: always
    ports:
        - "${FRONTENDPORT:-8086}:80"
    depends_on:
        - api
    volumes:
        - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
        - panel_network

  api:
    image: ghcr.io/abai569/new-cloudpanel:latest
    platform: linux/amd64
    container_name: cloudpanel-api
    restart: always
    ports:
      - "${BACKENDPORT:-8111}:8111"
    networks:
      - panel_network
    volumes:
      - ./data/db.sqlite3:/home/python/panel/db.sqlite3
      - ./logs:/home/python/panel/logs
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8111/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  panel_network:
    driver: bridge